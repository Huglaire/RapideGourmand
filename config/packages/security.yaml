security:
    # Configuration du hachage des mots de passe
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # Définition du fournisseur d'utilisateurs (lecture depuis la base de données)
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    # Hiérarchie des rôles
    # Un administrateur hérite des droits d'un employé,
    # qui hérite lui-même des droits d'un utilisateur.
    role_hierarchy:
        ROLE_EMPLOYEE: ROLE_USER
        ROLE_ADMIN: ROLE_EMPLOYEE

    firewalls:
        # Désactive la sécurité pour les outils de développement Symfony
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        # Authentification via l'endpoint de connexion JWT
        login:
            pattern: ^/api/login_check
            stateless: true
            provider: app_user_provider
            json_login:
                check_path: /api/login_check
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        # Protège toutes les routes de l'API avec un JWT
        api:
            pattern: ^/api
            stateless: true
            jwt: ~

        # Firewall principal de l'application
        main:
            lazy: true
            provider: app_user_provider

    access_control:
        # Routes accessibles sans authentification
        - { path: ^/api/login_check, roles: PUBLIC_ACCESS }
        - { path: ^/api/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/account/restore$, roles: PUBLIC_ACCESS }

        # Documentation Swagger
        - { path: ^/api/doc$, roles: PUBLIC_ACCESS }
        - { path: ^/api/doc\.json$, roles: PUBLIC_ACCESS }

        # Consultation publique des menus
        - { path: ^/api/menus$, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/menus/\d+$, roles: PUBLIC_ACCESS, methods: [GET] }

        # Consultation publique des avis validés
        - { path: ^/api/reviews$, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/reviews/\d+$, roles: PUBLIC_ACCESS, methods: [GET] }

        # Toutes les autres routes de l'API nécessitent un utilisateur authentifié
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            # Réduction du coût de hachage afin d'accélérer les tests
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10