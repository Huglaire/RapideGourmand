security:

    # Configuration du hachage des mots de passe
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'


    # Fournisseur d'utilisateurs Doctrine
    providers:

        app_user_provider:

            entity:

                class: App\Entity\User

                property: email



    # Hiérarchie des rôles
    role_hierarchy:

        ROLE_EMPLOYEE: ROLE_USER

        ROLE_ADMIN: ROLE_EMPLOYEE



    firewalls:


        # Outils Symfony
        dev:

            pattern: ^/(_profiler|_wdt|assets|build)/

            security: false



        # Connexion JWT
        login:

            pattern: ^/api/login_check$

            stateless: true

            provider: app_user_provider

            user_checker: App\Security\UserChecker


            json_login:

                check_path: /api/login_check

                username_path: email

                password_path: password

                success_handler: lexik_jwt_authentication.handler.authentication_success

                failure_handler: lexik_jwt_authentication.handler.authentication_failure




        # API protégée JWT
        api:

            pattern: ^/api

            stateless: true

            provider: app_user_provider

            jwt: ~




        # Application Symfony classique
        main:

            lazy: true

            provider: app_user_provider




    access_control:


        # Authentification
        - { path: ^/api/login_check$, roles: PUBLIC_ACCESS }

        - { path: ^/api/register$, roles: PUBLIC_ACCESS }

        - { path: ^/api/account/restore$, roles: PUBLIC_ACCESS }



        # Documentation API
        - { path: ^/api/doc$, roles: PUBLIC_ACCESS }

        - { path: ^/api/doc\.json$, roles: PUBLIC_ACCESS }



        # Menus publics
        - { path: ^/api/menus$, roles: PUBLIC_ACCESS, methods: [GET] }

        - { path: ^/api/menus/\d+$, roles: PUBLIC_ACCESS, methods: [GET] }



        # Avis publics
        - { path: ^/api/reviews$, roles: PUBLIC_ACCESS, methods: [GET] }

        - { path: ^/api/reviews/home$, roles: PUBLIC_ACCESS, methods: [GET] }

        - { path: ^/api/reviews/\d+$, roles: PUBLIC_ACCESS, methods: [GET] }



        # Tout le reste de l'API nécessite un JWT
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }




when@test:

    security:

        password_hashers:

            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:

                algorithm: auto

                cost: 4

                time_cost: 3

                memory_cost: 10