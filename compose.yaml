services:

  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rapidegourmand_php
    restart: unless-stopped
    working_dir: /var/www/html

    volumes:
      - ./:/var/www/html

    depends_on:
      database:
        condition: service_healthy
      mongodb:
        condition: service_started

    networks:
      - rapidegourmand

  nginx:
    image: nginx:alpine
    container_name: rapidegourmand_nginx
    restart: unless-stopped

    ports:
      - "8000:80"

    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - php

    networks:
      - rapidegourmand

  database:
    image: mysql:8.0
    container_name: rapidegourmand_mysql
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rapidegourmand

    command: --default-authentication-plugin=mysql_native_password

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - rapidegourmand

  mongodb:
    image: mongo:8
    container_name: rapidegourmand_mongodb
    restart: unless-stopped

    volumes:
      - mongo_data:/data/db

    networks:
      - rapidegourmand

volumes:
  mysql_data:
  mongo_data:

networks:
  rapidegourmand:
    driver: bridge